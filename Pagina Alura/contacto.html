<!DOCTYPE html>


<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto </title>
    <link rel="stylesheet"href="reset.css">
        <link rel="stylesheet"href="style.css">

</head>
    <body>
        <header>
            <div class="caja">
    <h1><img src="imagenes/logo.png"alt="Logo de la barbería alura"></h1>
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="nueva pagina ALURA.html">Productos</a></li>
                        <li><a href="contacto.html">Contacto</a></li>
                     </ul>
                </nav>
            </div>
        </header>
        <main>
            <form class="formularios">
                <label for="nombreapellido" >Nombre y Apellido</label>
                <input type="text"id="nombreapellido" class="input-padron"required>
            
            
                <label for="correo" >Correo electrónico</label>
                <input type="email"id=correo class="input-padron"required placeholder="email@dominio.com">

                <label for="tel" >Telefono</label>
                        <input type="telefono"id="telefono" class="input-padron"required placeholder="(XX) XXX XXX XX">

                <label for="mensaje">Mensaje</label>
                <textarea cols="70" rows="10" id="mensaje" class="input-padron" required ></textarea>
                <fieldset>
                     <p>¿Como le gustaría que lo contactaramos?</p>
                        

                        <label for="radiomail"><input type="radio" name="contacto" value="e-mail" id="radiomail">E-mail</label>
                        

                        <label for="radio-cel"><input type="radio" name="contacto" value="Telefono" id="radio-cel">Telefóno</label>
                        

                        <label for="radio-wsp"><input type="radio" name="contacto" value="Whatsapp" id="radio-wsp" checked>Whatsapp</label>
                        
            
                </fieldset>
                <fieldset>
                <legend>¿En que horario desea ser atendido?</legend>
                     <select>
                        <option >Mañana</option>
                        <option>Tarde</option>
                        <option >Noche</option>
                    </select>
                </fieldset>
                <label class="checkbox"><input type="checkbox" checked>¿Legustaría recibir novedades de la barbería Alura?</label>
            <input type="submit" value="Enviar Formulario" class="enviar">
            </form>
            <thead>
               
            <table>
                <thead>
                <tr>
                    <td>Día </td>
                    <td>Horario </td>
                </tr>
            </thead>
                <tbody>
                <tr>
                    <td>Lunes </td>
                    <td>08:00 a 20:00</td>
                </tr>
                <tr>
                    <td>Miercoles </td>
                    <td>08:00 a 20:00</td>
                </tr>
            </tr>
            <tr>
                <td>Viernes </td>
                <td>08:00 a 20:00</td>
            </tr>
        </tbody>
        
            </table>
        </main>
        <footer>
            <img src="imagenes/logo-blanco.png"alt="Logo de la barbería alura">
            <legend class="copy"> &copy; Copyright Barbería Alura - 2023</legend>

       </footer>
    </body>






</html>
